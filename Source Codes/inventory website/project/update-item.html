<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Update Item</title>

  <!-- ✅ Enable Dark Mode if theme is dark -->
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark-mode");
    }
  </script>

  <!-- ✅ Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    /* ✅ Page base styles and dark mode overrides */
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #000;
      padding: 40px;
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    .dark-mode body {
      background: #1e1e1e;
      color: #fff;
    }

    /* ✅ Back arrow button styles */
    .top-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 18px;
      text-decoration: none;
      color: #007bff;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      z-index: 1000;
    }

    .top-arrow span {
      font-size: 24px;
      margin-right: 6px;
    }

    .dark-mode .top-arrow {
      color: #66b2ff;
    }

    /* ✅ Layout container with flex for two sections */
    .container {
      display: flex;
      gap: 40px;
      max-width: 1100px;
      margin: 60px auto 0 auto;
    }

    /* ✅ Styles for left form and right item display */
    .form-section, .info-section {
      flex: 1;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .dark-mode .form-section,
    .dark-mode .info-section {
      background: #2c2c2c;
      box-shadow: 0 0 10px rgba(255,255,255,0.05);
    }

    /* ✅ Input fields and textareas */
    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .dark-mode input,
    .dark-mode textarea {
      background-color: #444;
      color: white;
      border: 1px solid #777;
    }

    /* ✅ Update and delete button styles */
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #updateBtn {
      background-color: #f39c12;
      color: white;
    }

    #deleteBtn {
      background-color: #e74c3c;
      color: white;
    }

    /* ✅ Display item info section */
    .info-section h3 {
      font-size: 22px;
      margin-bottom: 15px;
    }

    .info-section div {
      margin-bottom: 14px;
      font-size: 18px;
    }

    .info-section strong {
      font-weight: bold;
    }

    /* ✅ Modal styling for update/delete/success */
    #updateModal,
    #deleteModal,
    #successModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    #modalBox, #successBox, #updateBox {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      font-size: 18px;
    }

    .modal-buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .modal-buttons button {
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .btn-yes {
      background-color: #e74c3c;
      color: white;
    }

    .btn-no {
      background-color: #ccc;
      color: #000;
    }

    .dark-mode #modalBox,
    .dark-mode #successBox,
    .dark-mode #updateBox {
      background-color: #2c2c2c;
      color: white;
    }

    .dark-mode .btn-no {
      background-color: #555;
      color: white;
    }
  </style>
</head>
<body>
  <!-- ✅ Back navigation button -->
  <button class="top-arrow" onclick="window.location.href='inventory.html'"><span>&larr;</span> Back to Inventory List</button>

  <!-- ✅ Form + Info container -->
  <div class="container">
    <!-- ✅ Left form section -->
    <div class="form-section">
      <h2>Update Inventory Item</h2>
      <input id="itemName" type="text" placeholder="Item Name">
      <input id="partNo" type="text" placeholder="Part Number">
      <input id="itemQty" type="number" placeholder="Quantity">
      <input id="itemSize" type="text" placeholder="Size">
      <input id="itemLocation" type="text" placeholder="Location">
      <textarea id="itemDesc" placeholder="Description"></textarea>
      <button id="updateBtn">Update Item</button>
      <button id="deleteBtn">Delete Item</button>
    </div>

    <!-- ✅ Right info section -->
    <div class="info-section">
      <h3>Current Item Details</h3>
      <div><strong>Name:</strong> <span id="viewName">-</span></div>
      <div><strong>Part No:</strong> <span id="viewPartNo">-</span></div>
      <div><strong>Qty:</strong> <span id="viewQty">-</span></div>
      <div><strong>Size:</strong> <span id="viewSize">-</span></div>
      <div><strong>Location:</strong> <span id="viewLocation">-</span></div>
      <div><strong>Description:</strong> <span id="viewDesc">-</span></div>
    </div>
  </div>

  <!-- ✅ Delete confirmation modal -->
  <div id="deleteModal">
    <div id="modalBox">
      <p>Are you sure you want to delete this item?</p>
      <div class="modal-buttons">
        <button class="btn-yes" onclick="confirmDelete()">Yes</button>
        <button class="btn-no" onclick="closeDeleteModal()">No</button>
      </div>
    </div>
  </div>

  <!-- ✅ Update confirmation modal -->
  <div id="updateModal">
    <div id="updateBox">
      <p>Item updated successfully.</p>
    </div>
  </div>

  <!-- ✅ Delete success modal -->
  <div id="successModal">
    <div id="successBox">
      <p>Item deleted successfully.</p>
    </div>
  </div>

  <script>
    // ✅ Firebase configuration and initialization
    const firebaseConfig = {
      apiKey: "AIzaSyDznX-G5fsyep_BtSTOxSX6dk1Rky65vaU",
      authDomain: "weldinginventory.firebaseapp.com",
      projectId: "weldinginventory"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const itemId = localStorage.getItem("editItemId");

    // ✅ Load item details into form and info section
    async function loadItem() {
      if (!itemId) return location.href = "inventory.html";
      const doc = await db.collection("items").doc(itemId).get();
      if (!doc.exists) return location.href = "inventory.html";
      const data = doc.data();
      document.getElementById("itemName").value = data.name || "";
      document.getElementById("partNo").value = data.partNo || "";
      document.getElementById("itemQty").value = data.qty || "";
      document.getElementById("itemSize").value = data.size || "";
      document.getElementById("itemLocation").value = data.location || "";
      document.getElementById("itemDesc").value = data.desc || "";
      document.getElementById("viewName").textContent = data.name || "-";
      document.getElementById("viewPartNo").textContent = data.partNo || "-";
      document.getElementById("viewQty").textContent = data.qty || "-";
      document.getElementById("viewSize").textContent = data.size || "-";
      document.getElementById("viewLocation").textContent = data.location || "-";
      document.getElementById("viewDesc").textContent = data.desc || "-";
    }

    // ✅ Update item in Firestore
    async function updateItem() {
      const name = document.getElementById("itemName").value.trim();
      const partNo = document.getElementById("partNo").value.trim();
      const qty = parseInt(document.getElementById("itemQty").value);
      const size = document.getElementById("itemSize").value.trim();
      const location = document.getElementById("itemLocation").value.trim();
      const desc = document.getElementById("itemDesc").value.trim();

      await db.collection("items").doc(itemId).update({
        name, partNo, qty, size, location, desc, updated: new Date()
      });

      const updateModal = document.getElementById("updateModal");
      updateModal.style.display = "flex";

      setTimeout(() => {
        updateModal.style.display = "none";
        window.location.href = "inventory.html";
      }, 1000);
    }

    // ✅ Modal handlers
    function showDeleteModal() {
      document.getElementById("deleteModal").style.display = "flex";
    }

    function closeDeleteModal() {
      document.getElementById("deleteModal").style.display = "none";
    }

    // ✅ Confirm and delete item from Firestore
    async function confirmDelete() {
      await db.collection("items").doc(itemId).delete();
      document.getElementById("deleteModal").style.display = "none";
      document.getElementById("successModal").style.display = "flex";
      setTimeout(() => {
        document.getElementById("successModal").style.display = "none";
        window.location.href = "inventory.html";
      }, 1000);
    }

    // ✅ Attach handlers and load item on page load
    document.getElementById("updateBtn").onclick = updateItem;
    document.getElementById("deleteBtn").onclick = showDeleteModal;
    window.onload = loadItem;
  </script>
</body>
</html>
