<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Update Item</title>

  <!-- ✅ Apply Dark Mode if stored in localStorage -->
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark-mode");
    }
  </script>

  <!-- ✅ Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    /* ✅ Base Theme */
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f8;
      color: #000;
      padding: 40px;
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    .dark-mode body {
      background: #1e1e1e;
      color: #fff;
    }

    /* 🔙 Back Link */
    .top-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 17px;
      text-decoration: none;
      color: #007bff;
      background: none;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      z-index: 1000;
      font-weight: 500;
    }

    .top-arrow span:first-child { font-size: 22px; }
    .dark-mode .top-arrow { color: #66b2ff; }

    /* 📦 Main Container */
    .container {
      display: flex;
      gap: 40px;
      max-width: 1100px;
      margin: 60px auto 0 auto;
    }

    /* 🛠️ Update Form Styling */
    .form-section {
      flex: 1;
      background: #fff;
      padding: 25px 35px;
      border: 2px solid #000;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .dark-mode .form-section {
      background-color: #2c2c2c;
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.05);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .dark-mode input, .dark-mode textarea {
      background-color: #444;
      color: white;
      border: 1px solid #777;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #updateBtn { background-color: #f39c12; color: white; }
    #deleteBtn { background-color: #e74c3c; color: white; }

    /* 📋 Current Item Details (Right Box) */
    .info-section {
      flex: 1;
      border: 2px solid #000;
      padding: 25px 35px;
      font-size: 17px;
      background-color: #fff;
      color: #000;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .dark-mode .info-section {
      background-color: #2c2c2c;
      color: #fff;
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.05);
      max-width: 500px;

    }

    .info-section h3 {
      font-size: 19px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 20px;
    }

    .info-section .row {
      display: flex;
      margin-bottom: 12px;
    }

    .info-section .label {
      width: 120px;
    }

    .info-section .value {
      flex: 1;
      word-wrap: break-word;
  word-break: break-word;
  white-space: pre-wrap;
  max-width: 100%;

    }

    /* 🔐 Modal Styling */
    #updateModal, #deleteModal, #successModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    #modalBox, #successBox, #updateBox {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      font-size: 18px;
    }

    .modal-buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .modal-buttons button {
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .btn-yes { background-color: #e74c3c; color: white; }
    .btn-no  { background-color: #ccc; color: #000; }

    .dark-mode #modalBox, .dark-mode #successBox, .dark-mode #updateBox {
      background-color: #2c2c2c;
      color: white;
    }

    .dark-mode .btn-no { background-color: #555; color: white; }
  </style>
</head>

<body>
  <!-- 🔙 Back -->
  <a class="top-arrow" href="inventory.html">
    <span>&larr;</span><span>Back to Inventory List</span>
  </a>

  <div class="container">
    <!-- 🛠️ Update Form -->
    <div class="form-section">
      <h2>Update Inventory Item</h2>
      <input id="itemName" type="text" placeholder="Item Name">
      <input id="partNo" type="text" placeholder="Part Number">
      <input id="itemQty" type="number" placeholder="Quantity">
      <input id="itemSize" type="text" placeholder="Size">
      <input id="itemLocation" type="text" placeholder="Location">
      <textarea id="itemDesc" placeholder="Description"></textarea>
      <input id="itemTag" type="text" placeholder="Tag (e.g. #laser)">
      <button id="updateBtn">Update Item</button>
      <button id="deleteBtn">Delete Item</button>
    </div>

    <!-- 📋 Item Preview -->
    <div class="info-section">
      <h3>Current Item Details</h3>
      <div class="row"><div class="label">Name</div>:&nbsp;<div class="value" id="viewName">-</div></div>
<div class="row"><div class="label">Part No</div>:&nbsp;<div class="value" id="viewPartNo">-</div></div>
<div class="row"><div class="label">Qty</div>:&nbsp;<div class="value" id="viewQty">-</div></div>
<div class="row"><div class="label">Size</div>:&nbsp;<div class="value" id="viewSize">-</div></div>
<div class="row"><div class="label">Location</div>:&nbsp;<div class="value" id="viewLocation">-</div></div>
<div class="row"><div class="label">Description</div>:&nbsp;<div class="value" id="viewDesc">-</div></div>
<div class="row"><div class="label">Tag</div>:&nbsp;<div class="value" id="viewTag">-</div></div>

    </div>
  </div>

  <!-- 🧾 Modals -->
  <div id="deleteModal">
    <div id="modalBox">
      <p>Are you sure you want to delete this item?</p>
      <div class="modal-buttons">
        <button class="btn-yes" onclick="confirmDelete()">Yes</button>
        <button class="btn-no" onclick="closeDeleteModal()">No</button>
      </div>
    </div>
  </div>

  <div id="updateModal"><div id="updateBox"><p>Item updated successfully.</p></div></div>
  <div id="successModal"><div id="successBox"><p>Item deleted successfully.</p></div></div>

  <!-- 🧠 Firebase Logic -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDznX-G5fsyep_BtSTOxSX6dk1Rky65vaU",
      authDomain: "weldinginventory.firebaseapp.com",
      projectId: "weldinginventory"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const itemId = localStorage.getItem("editItemId");

    async function loadItem() {
      if (!itemId) return location.href = "inventory.html";
      const doc = await db.collection("items").doc(itemId).get();
      if (!doc.exists) return location.href = "inventory.html";
      const data = doc.data();

      // Fill form
      document.getElementById("itemName").value = data.name || "";
      document.getElementById("partNo").value = data.partNo || "";
      document.getElementById("itemQty").value = data.qty || "";
      document.getElementById("itemSize").value = data.size || "";
      document.getElementById("itemLocation").value = data.location || "";
      document.getElementById("itemDesc").value = data.desc || "";
      document.getElementById("itemTag").value = data.tag ? `#${data.tag}` : "";

      // Fill view
      document.getElementById("viewName").textContent = data.name || "-";
document.getElementById("viewPartNo").textContent = data.partNo || "-";
document.getElementById("viewQty").textContent = data.qty || "-";
document.getElementById("viewSize").textContent = data.size || "-";
document.getElementById("viewLocation").textContent = data.location || "-";

const formattedDesc = (data.desc || "").replace(/(.{1,50})(\s|$)/g, "$1<br>");
document.getElementById("viewDesc").innerHTML = formattedDesc;

document.getElementById("viewTag").textContent = data.tag || "-";


    }

    async function updateItem() {
      const name = document.getElementById("itemName").value.trim();
      const partNo = document.getElementById("partNo").value.trim();
      const qty = parseInt(document.getElementById("itemQty").value);
      const size = document.getElementById("itemSize").value.trim();
      const location = document.getElementById("itemLocation").value.trim();
      const desc = document.getElementById("itemDesc").value.trim();
      let tag = document.getElementById("itemTag").value.trim();
      if (tag.startsWith("#")) tag = tag.slice(1);

      await db.collection("items").doc(itemId).update({
        name, partNo, qty, size, location, desc, tag, updated: new Date()
      });

      document.getElementById("updateModal").style.display = "flex";
      setTimeout(() => {
        document.getElementById("updateModal").style.display = "none";
        window.location.href = "inventory.html";
      }, 1000);
    }

    function showDeleteModal() {
      document.getElementById("deleteModal").style.display = "flex";
    }

    function closeDeleteModal() {
      document.getElementById("deleteModal").style.display = "none";
    }

    async function confirmDelete() {
      await db.collection("items").doc(itemId).delete();
      document.getElementById("deleteModal").style.display = "none";
      document.getElementById("successModal").style.display = "flex";
      setTimeout(() => {
        document.getElementById("successModal").style.display = "none";
        window.location.href = "inventory.html";
      }, 1000);
    }

    document.getElementById("updateBtn").onclick = updateItem;
    document.getElementById("deleteBtn").onclick = showDeleteModal;
    window.onload = loadItem;
  </script>
</body>
</html>
